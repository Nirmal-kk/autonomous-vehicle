name: Autonomous Vehicle CI/CD

on:
  push:
    branches:
      - master
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install pytest

    - name: Sensor Testing
      run: |
        python -m pytest sensor/

    - name: Decision Testing
      run: |
        python -m pytest decision/

    - name: Control Testing
      run: |
        python -m pytest control/

    - name: Deploy
      run: |
        echo "Deployment Successful"